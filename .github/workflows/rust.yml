name: Rust CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check code
      run: cargo check
    - name: Run tests
      run: cargo test

  release:
    if: github.event_name == 'release'
    needs: check
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Release
      run: cargo build --release

    - name: Zip Release Asset
      run: Compress-Archive -Path target/release/glscript-language-server.exe -DestinationPath glscript-language-server-windows.zip

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: glscript-language-server-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
